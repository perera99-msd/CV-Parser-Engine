name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Only trigger when backend files change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the backend folder
            cd ${{ secrets.EC2_REPO_PATH }}
            
            # Pull the latest code from GitHub
            git pull origin main
            
            cd backend
            
            # Inject environment variables from GitHub Secrets
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
            
            # Rebuild and restart the Docker container seamlessly
            docker compose up -d --build
            
            # Clean up old unused Docker images to save disk space
            docker image prune -f
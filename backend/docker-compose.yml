# backend/docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    container_name: resumap-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env

  caddy:
    image: caddy:2-alpine
    container_name: resumap-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config: